name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: flake8 src tests

      - name: Unit tests
        run: pytest -v

      - name: Download dataset
        run: python -m src.data.download

      - name: Train model
        run: python -m src.models.train

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: |
            mlruns/
            models/

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model for image
        run: |
          python -m src.data.download
          python -m src.models.train

      - name: Build Docker image
        run: docker build -t heart-disease-api .

      - name: Smoke test container
        run: |
          docker run -d -p 8000:8000 --name api heart-disease-api
          sleep 5
          curl -sf localhost:8000/health
          curl -sf -X POST localhost:8000/predict \
            -H 'Content-Type: application/json' -d @sample_input.json
          docker rm -f api
